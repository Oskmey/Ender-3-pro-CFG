# ============================================================
# Ender-3 / Ender-3 Pro (Creality 4.2.2) + Mainsail + CR Touch
# Direct drive mod
# ============================================================

[include mainsail.cfg]

# -------------------------
# MCU
# -------------------------
[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

# -------------------------
# Virtual SD (Mainsail uploads)
# -------------------------
[virtual_sdcard]
path: /home/oskar/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# -------------------------
# Printer limits
# -------------------------
[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# -------------------------
# X/Y/Z steppers
# -------------------------
[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

# Z homes with the probe
[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -2
position_max: 250

# -------------------------
# Extruder / hotend
# -------------------------
[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 34.406
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250

# -------------------------
# Heated bed
# -------------------------
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# -------------------------
# Fan (part cooling)
# -------------------------
[fan]
pin: PA0

# ============================================================
# CR Touch / BLTouch-compatible probe
# ============================================================
[bltouch]
sensor_pin: ^PB1
control_pin: PB0

# Probe is left/front of nozzle
x_offset: -44
y_offset: -9
#z_offset: 0.495

probe_with_touch_mode: true
stow_on_each_sample: false

speed: 5.0
lift_speed: 10.0
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3

# -------------------------
# Safe Z homing
# This is NOZZLE position so that the PROBE lands near bed center
# -------------------------
[safe_z_home]
home_xy_position: 161.5, 126.5
speed: 50
z_hop: 10
z_hop_speed: 10

# -------------------------
# Bed Mesh
# mesh_min / mesh_max are probe positions on the bed
# -------------------------
[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 10, 10
mesh_max: 185, 215
probe_count: 7, 7
mesh_pps: 2, 2
algorithm: bicubic
adaptive_margin: 8
fade_start: 1
fade_end: 10

# -------------------------
# Object exclusion / adaptive mesh object data
# -------------------------
[exclude_object]

# -------------------------
# CR Touch-assisted bed screw adjustment
# -------------------------
[screws_tilt_adjust]
screw1: 76, 41
screw1_name: front left
screw2: 234, 41
screw2_name: front right
screw3: 234, 212
screw3_name: rear right
screw4: 76, 212
screw4_name: rear left
speed: 50
horizontal_move_z: 8
screw_thread: CW-M4

# -------------------------
# LCD (stock Ender-3 style ST7920)
# -------------------------
[display]
lcd_type: st7920
cs_pin: PB12
sclk_pin: PB13
sid_pin: PB15
encoder_pins: ^PB14, ^PB10
click_pin: ^!PB2

